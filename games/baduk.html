<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어린이 바둑 교실</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Level Selection ── */
        #level-screen { text-align: center; color: white; }

        .main-title {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255,200,50,0.7);
            letter-spacing: 2px;
        }
        .main-subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .level-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .level-card {
            background: white;
            border-radius: 24px;
            padding: 30px 35px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            min-width: 170px;
            border: 3px solid transparent;
        }
        .level-card:hover {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .level-card.easy  { border-color: #4caf50; }
        .level-card.mid   { border-color: #ff9800; }
        .level-card.hard  { border-color: #f44336; }

        .lv-icon  { font-size: 3.5rem; margin-bottom: 10px; }
        .lv-name  { font-size: 1.6rem; font-weight: bold; color: #222; }
        .lv-desc  { font-size: 0.9rem; color: #666; margin-top: 6px; }
        .lv-board {
            display: inline-block;
            margin-top: 10px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }
        .easy  .lv-board { background: #4caf50; }
        .mid   .lv-board { background: #ff9800; }
        .hard  .lv-board { background: #f44336; }

        /* ── Game Screen ── */
        #game-screen { display: none; flex-direction: column; align-items: center; gap: 14px; }

        .game-row {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-wrapper {
            background: #c8941c;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        canvas { display: block; cursor: pointer; border-radius: 4px; }

        .side-panel {
            background: rgba(255,255,255,0.97);
            border-radius: 18px;
            padding: 18px;
            width: 210px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .player-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .player-card.active-turn {
            border-color: #4caf50;
            background: #f1fdf2;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.2);
        }

        .stone-badge {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }
        .stone-badge.black { background: radial-gradient(circle at 35% 35%, #777, #111); }
        .stone-badge.white { background: radial-gradient(circle at 35% 35%, #fff, #ccc); border: 2px solid #999; }

        .player-label { font-size: 0.9rem; font-weight: bold; color: #333; }
        .player-score { font-size: 0.8rem; color: #666; }

        .divider { border: none; border-top: 1px solid #eee; }

        #msg-box {
            background: #fff8e1;
            border-left: 4px solid #ffc107;
            border-radius: 0 10px 10px 0;
            padding: 10px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #5d4037;
            min-height: 52px;
            display: flex;
            align-items: center;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.15s, transform 0.1s;
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:active { transform: translateY(1px); }

        .btn-pass   { background: #ff9800; color: white; }
        .btn-hint   { background: #2196f3; color: white; }
        .btn-back   { background: #9e9e9e; color: white; font-size: 0.85rem; padding: 8px; }

        /* Turn indicator bar */
        .turn-bar {
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 8px 22px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .turn-dot {
            width: 20px; height: 20px;
            border-radius: 50%;
        }
        .turn-dot.black { background: #333; box-shadow: 0 0 6px rgba(0,0,0,0.7); }
        .turn-dot.white { background: white; box-shadow: 0 0 6px rgba(255,255,255,0.7); }

        /* ── Result Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 40px 36px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .modal-emoji  { font-size: 4rem; margin-bottom: 10px; }
        .modal-title  { font-size: 2rem; font-weight: bold; color: #333; margin-bottom: 6px; }
        .modal-detail { font-size: 1rem; color: #555; margin: 16px 0; line-height: 1.7; }
        .modal-btns   { display: flex; gap: 10px; flex-direction: column; margin-top: 10px; }
        .btn-replay   { background: #4caf50; color: white; }
        .btn-level    { background: #607d8b; color: white; }

        /* Thinking animation */
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .thinking { animation: pulse 0.8s infinite; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .main-title { font-size: 2rem; }
            .side-panel { width: 100%; }
            .game-row { flex-direction: column; align-items: center; }
        }

        /* nomorescroll: home button */
        .nms-home-btn {
            position: fixed; top: 12px; left: 12px; z-index: 99999;
            background: rgba(0,0,0,0.6); color: #fff !important;
            text-decoration: none; padding: 8px 14px;
            border-radius: 8px; font-size: 0.9rem; font-weight: 600;
            font-family: inherit;
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            transition: background 0.15s, border-color 0.15s;
        }
        .nms-home-btn:hover {
            background: rgba(0,0,0,0.85); border-color: #ffc107;
        }
        .nms-controls {
            display: flex; gap: 8px;
            padding: 14px 8px;
            margin: 12px -8px 4px;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            justify-content: center; align-items: center;
            flex-wrap: wrap;
        }
        .nms-controls > * {
            position: static !important;
            top: auto !important; left: auto !important;
            right: auto !important; bottom: auto !important;
            margin: 0 !important;
        }
        .nms-controls .nms-home-btn {
            background: rgba(0,0,0,0.75);
            color: #fff !important;
            border: 1px solid rgba(0,0,0,0.2);
        }
        body.nms-in-game .nms-home-btn:not(.nms-controls .nms-home-btn) { display: none !important; }

        /* nomorescroll mobile patch */
        @media (max-width: 640px) {
            body { padding: 8px !important; }
            canvas { max-width: 92vw !important; height: auto !important; display: block !important; }
            .side-panel, .panel, [class*="side-panel"] {
                width: 100% !important; max-width: 360px !important;
                box-sizing: border-box !important;
            }
            .game-row, .container-row, [class*="game-row"], [class*="row"] {
                flex-direction: column !important; align-items: center !important;
            }
            button { min-height: 44px; }
            .lang-grid, .rule-cards { grid-template-columns: 1fr 1fr !important; }
        }
    </style>
</head>
<body>

<a href="../index.html" class="nms-home-btn" aria-label="Home">← Home</a>

<!-- ═══════════════ LEVEL SCREEN ═══════════════ -->
<div id="level-screen">
    <div class="main-title">🎯 어린이 바둑 교실</div>
    <div class="main-subtitle">컴퓨터와 바둑 대결을 해보세요!</div>

    <div class="level-cards">
        <div class="level-card easy" onclick="startGame(1)">
            <div class="lv-icon">🐣</div>
            <div class="lv-name">쉬움</div>
            <div class="lv-desc">바둑이 처음이에요<br>작은 판으로 시작!</div>
            <div class="lv-board">5 × 5 판</div>
        </div>
        <div class="level-card mid" onclick="startGame(2)">
            <div class="lv-icon">🐥</div>
            <div class="lv-name">보통</div>
            <div class="lv-desc">조금 알고 있어요<br>조금 더 큰 판!</div>
            <div class="lv-board">7 × 7 판</div>
        </div>
        <div class="level-card hard" onclick="startGame(3)">
            <div class="lv-icon">🦅</div>
            <div class="lv-name">어려움</div>
            <div class="lv-desc">자신 있어요!<br>표준 9칸 판!</div>
            <div class="lv-board">9 × 9 판</div>
        </div>
    </div>
</div>

<!-- ═══════════════ GAME SCREEN ═══════════════ -->
<div id="game-screen">
    <div class="turn-bar">
        <div class="turn-dot black" id="turn-dot"></div>
        <span id="turn-text">내 차례 (흑)</span>
    </div>

    <div class="game-row">
        <div class="board-wrapper">
            <canvas id="board-canvas"></canvas>
        </div>

        <div class="side-panel">
            <div class="player-card active-turn" id="card-black">
                <div class="stone-badge black"></div>
                <div>
                    <div class="player-label">나 (흑)</div>
                    <div class="player-score" id="score-black">잡은 돌: 0</div>
                </div>
            </div>
            <div class="player-card" id="card-white">
                <div class="stone-badge white"></div>
                <div>
                    <div class="player-label">컴퓨터 (백)</div>
                    <div class="player-score" id="score-white">잡은 돌: 0</div>
                </div>
            </div>

            <hr class="divider">

            <div id="msg-box">돌을 놓아보세요! 😊</div>

            <button class="btn btn-hint"  id="btn-hint" onclick="showHint()">💡 힌트 보기</button>
            <button class="btn btn-pass"  onclick="playerPass()">✋ 패스하기</button>
            <button class="btn btn-back"  onclick="goToLevelScreen()">← 레벨 선택</button>
        </div>
    </div>
</div>

<!-- ═══════════════ RESULT MODAL ═══════════════ -->
<div id="result-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-emoji" id="res-emoji">🏆</div>
        <div class="modal-title" id="res-title">게임 끝!</div>
        <div class="modal-detail" id="res-detail"></div>
        <div class="modal-btns">
            <button class="btn btn-replay" onclick="replayGame()">🔄 다시 하기</button>
            <button class="btn btn-level"  onclick="goToLevelScreenFromModal()">🏠 레벨 선택</button>
        </div>
    </div>
</div>

<script>
/* ══════════════════════════════════════════
   Constants & State
══════════════════════════════════════════ */
const EMPTY = 0, BLACK = 1, WHITE = 2;

let bs, cs;          // boardSize, cellSize
let board, captures, koPoint, passCnt, level, over, aiThinking;
let lastMove = null;
let hintCell = null;
let canvas, ctx;

/* ══════════════════════════════════════════
   Init / Navigation
══════════════════════════════════════════ */
function startGame(lv) {
    level = lv;
    bs    = lv === 1 ? 5 : lv === 2 ? 7 : 9;
    cs    = lv === 1 ? 68 : lv === 2 ? 58 : 50;

    board    = Array.from({length: bs}, () => new Array(bs).fill(EMPTY));
    captures = {black: 0, white: 0};
    koPoint  = null;
    passCnt  = 0;
    over     = false;
    aiThinking = false;
    lastMove = null;
    hintCell = null;

    document.getElementById('level-screen').style.display = 'none';
    document.getElementById('game-screen').style.display  = 'flex';

    canvas = document.getElementById('board-canvas');
    const size = cs * (bs + 1);
    canvas.width  = size;
    canvas.height = size;
    ctx = canvas.getContext('2d');
    canvas.onclick = onCanvasClick;

    document.getElementById('btn-hint').style.display = lv === 1 ? 'block' : 'none';

    render();
    setMsg('돌을 놓아보세요! 😊');
    updateUI(BLACK);
}

function goToLevelScreen() {
    document.getElementById('game-screen').style.display  = 'none';
    document.getElementById('level-screen').style.display = 'block';
}
function goToLevelScreenFromModal() {
    closeModal();
    goToLevelScreen();
}
function replayGame() { closeModal(); startGame(level); }
function closeModal()  { document.getElementById('result-modal').classList.remove('show'); }

/* ══════════════════════════════════════════
   Board Rendering
══════════════════════════════════════════ */
function margin() { return cs; }

function render() {
    const m = margin();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background
    const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    bg.addColorStop(0, '#e8aa3a');
    bg.addColorStop(1, '#c8851a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Hint highlight
    if (hintCell) {
        ctx.fillStyle = 'rgba(33,150,243,0.25)';
        ctx.beginPath();
        ctx.arc(m + hintCell.x * cs, m + hintCell.y * cs, cs * 0.48, 0, Math.PI * 2);
        ctx.fill();
    }

    // Last move highlight
    if (lastMove) {
        ctx.fillStyle = 'rgba(255,100,100,0.25)';
        ctx.beginPath();
        ctx.arc(m + lastMove.x * cs, m + lastMove.y * cs, cs * 0.48, 0, Math.PI * 2);
        ctx.fill();
    }

    // Grid lines
    ctx.strokeStyle = '#7a5a10';
    ctx.lineWidth = 1.2;
    for (let i = 0; i < bs; i++) {
        ctx.beginPath(); ctx.moveTo(m + i*cs, m); ctx.lineTo(m + i*cs, m + (bs-1)*cs); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(m, m + i*cs); ctx.lineTo(m + (bs-1)*cs, m + i*cs); ctx.stroke();
    }

    // Star points
    for (const [sx, sy] of starPoints()) {
        ctx.fillStyle = '#7a5a10';
        ctx.beginPath();
        ctx.arc(m + sx*cs, m + sy*cs, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Coord labels (letters top, numbers left)
    ctx.fillStyle = 'rgba(80,50,5,0.8)';
    ctx.font = `bold ${cs*0.28}px Malgun Gothic, Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const cols = 'ABCDEFGHIJ';
    for (let i = 0; i < bs; i++) {
        ctx.fillText(cols[i], m + i*cs, m * 0.45);
        ctx.fillText(String(bs - i), m * 0.45, m + i*cs);
    }

    // Stones
    for (let y = 0; y < bs; y++)
        for (let x = 0; x < bs; x++)
            if (board[y][x] !== EMPTY)
                drawStone(x, y, board[y][x], x === (lastMove||{}).x && y === (lastMove||{}).y);
}

function starPoints() {
    if (bs === 9) return [[2,2],[6,2],[4,4],[2,6],[6,6]];
    if (bs === 7) return [[2,2],[4,2],[2,4],[4,4]];
    return [];
}

function drawStone(x, y, color, isLast) {
    const m = margin();
    const cx = m + x * cs, cy = m + y * cs;
    const r  = cs * 0.43;

    ctx.save();
    ctx.shadowColor   = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur    = 8;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;

    const g = ctx.createRadialGradient(cx - r*0.32, cy - r*0.32, r*0.08, cx, cy, r);
    if (color === BLACK) {
        g.addColorStop(0, '#888');
        g.addColorStop(1, '#111');
    } else {
        g.addColorStop(0, '#fff');
        g.addColorStop(1, '#bbb');
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Last-move marker
    if (isLast) {
        ctx.strokeStyle = color === BLACK ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.35, 0, Math.PI * 2);
        ctx.stroke();
    }
}

/* ══════════════════════════════════════════
   Go Logic
══════════════════════════════════════════ */
function neighbors(x, y) {
    const n = [];
    if (x > 0)    n.push([x-1, y]);
    if (x < bs-1) n.push([x+1, y]);
    if (y > 0)    n.push([x, y-1]);
    if (y < bs-1) n.push([x, y+1]);
    return n;
}

function findGroup(sx, sy) {
    const color = board[sy][sx];
    if (color === EMPTY) return {stones: [], liberties: new Set()};

    const stones    = [];
    const liberties = new Set();
    const visited   = new Set();
    const queue     = [{x: sx, y: sy}];

    while (queue.length) {
        const {x, y} = queue.shift();
        const key = x + ',' + y;
        if (visited.has(key)) continue;
        visited.add(key);
        stones.push({x, y});
        for (const [nx, ny] of neighbors(x, y)) {
            const nk = nx + ',' + ny;
            if (board[ny][nx] === EMPTY)  liberties.add(nk);
            else if (board[ny][nx] === color && !visited.has(nk)) queue.push({x: nx, y: ny});
        }
    }
    return {stones, liberties};
}

// Returns true if move is legal (does NOT place the stone permanently)
function isLegal(x, y, color) {
    if (board[y][x] !== EMPTY) return false;
    if (koPoint && koPoint.x === x && koPoint.y === y) return false;

    const opp = 3 - color;
    board[y][x] = color;

    // Check opponent captures
    let anyCapture = false;
    for (const [nx, ny] of neighbors(x, y)) {
        if (board[ny][nx] === opp) {
            if (findGroup(nx, ny).liberties.size === 0) { anyCapture = true; break; }
        }
    }
    // Check suicide
    let legal = anyCapture || findGroup(x, y).liberties.size > 0;
    board[y][x] = EMPTY;
    return legal;
}

// Places stone permanently; returns false if illegal
function placeStone(x, y, color) {
    if (!isLegal(x, y, color)) return false;
    const opp = 3 - color;
    board[y][x] = color;

    // Capture opponent groups with 0 liberties
    const capturedMap = new Map();
    for (const [nx, ny] of neighbors(x, y)) {
        if (board[ny][nx] === opp) {
            const grp = findGroup(nx, ny);
            if (grp.liberties.size === 0)
                grp.stones.forEach(s => capturedMap.set(s.x+','+s.y, s));
        }
    }
    const captured = [...capturedMap.values()];
    captured.forEach(s => { board[s.y][s.x] = EMPTY; });

    // Ko detection
    koPoint = null;
    if (captured.length === 1) {
        const own = findGroup(x, y);
        if (own.stones.length === 1 && own.liberties.size === 1) {
            const [kx, ky] = [...own.liberties][0].split(',').map(Number);
            koPoint = {x: kx, y: ky};
        }
    }

    if (color === BLACK) captures.black += captured.length;
    else                 captures.white += captured.length;

    lastMove = {x, y};
    return true;
}

/* ══════════════════════════════════════════
   AI
══════════════════════════════════════════ */
function scoreMove(x, y, color) {
    if (!isLegal(x, y, color)) return -Infinity;
    const opp = 3 - color;
    let score = 0;

    board[y][x] = color;

    // Count captures
    const capturedMap = new Map();
    for (const [nx, ny] of neighbors(x, y)) {
        if (board[ny][nx] === opp) {
            const grp = findGroup(nx, ny);
            if (grp.liberties.size === 0)
                grp.stones.forEach(s => capturedMap.set(s.x+','+s.y, s));
            else if (grp.liberties.size === 1)
                score += grp.stones.length * 6;  // atari threat
        }
    }
    score += capturedMap.size * 20;

    // Defence: save own groups in atari
    if (level >= 2) {
        for (const [nx, ny] of neighbors(x, y)) {
            if (board[ny][nx] === color) {
                const grp = findGroup(nx, ny);
                if (capturedMap.size === 0 && grp.liberties.size >= 2) score += 8;
            }
        }
    }

    board[y][x] = EMPTY;

    // Territory: prefer center
    const center = (bs - 1) / 2;
    const dist = Math.abs(x - center) + Math.abs(y - center);
    score += (bs * 2 - dist) * (level >= 2 ? 3 : 1);

    // Edge/corner penalty for higher levels
    if (level >= 2) {
        const isEdge   = x === 0 || x === bs-1 || y === 0 || y === bs-1;
        const isCorner = (x === 0 || x === bs-1) && (y === 0 || y === bs-1);
        if (isCorner) score -= 10;
        else if (isEdge) score -= 4;
    }

    // Noise
    score += Math.random() * (level === 1 ? 30 : level === 2 ? 12 : 5);
    return score;
}

function pickAiMove() {
    let best = -Infinity, move = null;
    for (let y = 0; y < bs; y++) {
        for (let x = 0; x < bs; x++) {
            if (board[y][x] !== EMPTY) continue;
            const s = scoreMove(x, y, WHITE);
            if (s > best) { best = s; move = {x, y}; }
        }
    }
    return move;
}

function runAI() {
    if (over) return;
    aiThinking = true;
    setMsg('컴퓨터가 생각 중이에요... 🤔');
    updateUI(WHITE);

    // Small delay for UX
    setTimeout(() => {
        const mv = pickAiMove();
        if (mv && placeStone(mv.x, mv.y, WHITE)) {
            passCnt = 0;
            render();
            setMsg('내 차례예요! 돌을 놓아보세요 😊');
        } else {
            passCnt++;
            setMsg('컴퓨터가 패스했어요! 내 차례예요 😊');
            if (passCnt >= 2) { endGame(); return; }
        }
        aiThinking = false;
        updateUI(BLACK);
    }, level === 1 ? 400 : level === 2 ? 600 : 900);
}

/* ══════════════════════════════════════════
   Player Actions
══════════════════════════════════════════ */
function onCanvasClick(e) {
    if (over || aiThinking) return;
    hintCell = null;

    const rect = canvas.getBoundingClientRect();
    const m    = margin();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left)  * scaleX;
    const my = (e.clientY - rect.top)   * scaleY;
    const x  = Math.round((mx - m) / cs);
    const y  = Math.round((my - m) / cs);

    if (x < 0 || x >= bs || y < 0 || y >= bs) return;

    if (!placeStone(x, y, BLACK)) {
        setMsg('거기엔 놓을 수 없어요! 😅');
        return;
    }
    passCnt = 0;
    render();
    updateUI(WHITE);
    runAI();
}

function playerPass() {
    if (over || aiThinking) return;
    hintCell = null;
    passCnt++;
    koPoint = null;
    if (passCnt >= 2) { endGame(); return; }
    setMsg('패스했어요! 컴퓨터 차례예요 🤔');
    updateUI(WHITE);
    runAI();
}

function showHint() {
    if (over || aiThinking) return;
    // Find best move for player
    let best = -Infinity, mv = null;
    for (let y = 0; y < bs; y++) {
        for (let x = 0; x < bs; x++) {
            if (!isLegal(x, y, BLACK)) continue;
            const s = scoreMove(x, y, BLACK);
            if (s > best) { best = s; mv = {x, y}; }
        }
    }
    if (mv) {
        hintCell = mv;
        render();
        setMsg(`💡 파란 곳에 놓아보세요! (${String.fromCharCode(65 + mv.x)}${bs - mv.y})`);
    }
}

/* ══════════════════════════════════════════
   Scoring & End
══════════════════════════════════════════ */
function calcTerritory() {
    const visited = new Set();
    let bt = 0, wt = 0;

    for (let sy = 0; sy < bs; sy++) {
        for (let sx = 0; sx < bs; sx++) {
            if (board[sy][sx] !== EMPTY || visited.has(sx+','+sy)) continue;

            // Flood-fill empty region
            const region = [];
            const borders = new Set();
            const queue   = [{x: sx, y: sy}];
            const vsub    = new Set();

            while (queue.length) {
                const {x, y} = queue.shift();
                const key = x+','+y;
                if (vsub.has(key)) continue;
                vsub.add(key);
                if (board[y][x] === EMPTY) {
                    region.push({x, y});
                    visited.add(key);
                    for (const [nx, ny] of neighbors(x, y))
                        if (!vsub.has(nx+','+ny)) queue.push({x: nx, y: ny});
                } else {
                    borders.add(board[y][x]);
                }
            }

            if (borders.size === 1) {
                if (borders.has(BLACK)) bt += region.length;
                else                    wt += region.length;
            }
        }
    }
    return {bt, wt};
}

function endGame() {
    over = true;
    const {bt, wt} = calcTerritory();
    const bs2 = captures.black + bt;
    const ws2 = captures.white + wt;

    let emoji, title;
    if (bs2 > ws2)       { emoji = '🏆'; title = '내가 이겼어요!'; }
    else if (ws2 > bs2)  { emoji = '😢'; title = '컴퓨터가 이겼어요'; }
    else                 { emoji = '🤝'; title = '비겼어요!'; }

    document.getElementById('res-emoji').textContent  = emoji;
    document.getElementById('res-title').textContent  = title;
    document.getElementById('res-detail').innerHTML   =
        `<b>흑 (나):</b> ${bt}집 + ${captures.black}잡기 = <b>${bs2}점</b><br>` +
        `<b>백 (컴퓨터):</b> ${wt}집 + ${captures.white}잡기 = <b>${ws2}점</b>`;

    document.getElementById('result-modal').classList.add('show');
}

/* ══════════════════════════════════════════
   UI Helpers
══════════════════════════════════════════ */
function setMsg(txt) {
    document.getElementById('msg-box').textContent = txt;
}

function updateUI(currentColor) {
    document.getElementById('score-black').textContent = '잡은 돌: ' + captures.black;
    document.getElementById('score-white').textContent = '잡은 돌: ' + captures.white;

    const cb = document.getElementById('card-black');
    const cw = document.getElementById('card-white');
    const dot= document.getElementById('turn-dot');
    const txt= document.getElementById('turn-text');

    if (currentColor === BLACK) {
        cb.classList.add('active-turn');
        cw.classList.remove('active-turn');
        dot.className = 'turn-dot black';
        txt.textContent = '내 차례 (흑)';
    } else {
        cw.classList.add('active-turn');
        cb.classList.remove('active-turn');
        dot.className = 'turn-dot white';
        txt.textContent = aiThinking ? '컴퓨터 차례 (백)...' : '컴퓨터 차례 (백)';
    }
}
</script>

<script>
/* nomorescroll: auto-skip intro screens */
window.addEventListener('load', () => {
  setTimeout(() => {
    try { if (typeof showLevelScreen === 'function') showLevelScreen(); } catch (e) {}
    ['lang-screen', 'intro-screen'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.classList.remove('active'); el.style.display = 'none'; }
    });
    if (!document.querySelector('.screen.active')) {
      const lv = document.getElementById('level-screen');
      if (lv) lv.classList.add('active');
    }
  }, 80);
});

/* nomorescroll: relocate home into side-panel (baduk has no vol/lang) */
function nmsMoveControls() {
  const sidePanel = document.querySelector('.side-panel');
  if (!sidePanel) return false;
  if (sidePanel.querySelector('.nms-controls')) return true;
  const row = document.createElement('div');
  row.className = 'nms-controls';
  const home = document.querySelector('.nms-home-btn');
  if (home) row.appendChild(home);
  sidePanel.appendChild(row);
  return true;
}
function nmsCheckGameScreen() {
  if (document.querySelector('#game-screen.active')) {
    document.body.classList.add('nms-in-game');
    nmsMoveControls();
  } else {
    document.body.classList.remove('nms-in-game');
  }
}
window.addEventListener('load', () => { setTimeout(nmsCheckGameScreen, 200); });
const nmsObs = new MutationObserver(nmsCheckGameScreen);
nmsObs.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });
</script>
